AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CoTrip collaborative travel planning app - backend

Globals:
  Function:
    Runtime: python3.13
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        APP_ENV: !Ref AppEnv
        LOG_LEVEL: !Ref LogLevel
        FRONTEND_BASE_URL: !Ref FrontendBaseUrl
        DB_HOST: !Ref DbHost
        DB_PORT: !Ref DbPort
        DB_NAME: !Ref DbName
        DB_USER: !Ref DbUser
        DB_PASSWORD: !Ref DbPassword

Parameters:
  AppEnv:
    Type: String
    Default: dev
  LogLevel:
    Type: String
    Default: INFO
  FrontendBaseUrl:
    Type: String
    Default: http://localhost:5173
  DbHost:
    Type: String
    Default: localhost
  DbPort:
    Type: String
    Default: "5432"
  DbName:
    Type: String
    Default: cotrip_dev
  DbUser:
    Type: String
    Default: postgres
  DbPassword:
    Type: String
    NoEcho: true
    Default: replace-me

Resources:

  TripGroupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cotrip-${AppEnv}-trip-group-function
      CodeUri: src/trip_group/
      Handler: app.lambda_handler

  InviteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cotrip-${AppEnv}-invite-function
      CodeUri: src/invite/
      Handler: app.lambda_handler

  CandidateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cotrip-${AppEnv}-candidate-function
      CodeUri: src/candidate/
      Handler: app.lambda_handler

  VoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cotrip-${AppEnv}-vote-function
      CodeUri: src/vote/
      Handler: app.lambda_handler

  ItineraryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cotrip-${AppEnv}-itinerary-function
      CodeUri: src/itinerary/
      Handler: app.lambda_handler

Outputs:
  TripGroupFunction:
    Description: TripGroupFunction ARN
    Value: !GetAtt TripGroupFunction.Arn
  InviteFunction:
    Description: InviteFunction ARN
    Value: !GetAtt InviteFunction.Arn
  CandidateFunction:
    Description: CandidateFunction ARN
    Value: !GetAtt CandidateFunction.Arn
  VoteFunction:
    Description: VoteFunction ARN
    Value: !GetAtt VoteFunction.Arn
  ItineraryFunction:
    Description: ItineraryFunction ARN
    Value: !GetAtt ItineraryFunction.Arn
